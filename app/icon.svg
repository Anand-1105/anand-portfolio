<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
  <!-- Shoulders -->
  <path d="M 50 100 C 50 80, 150 80, 150 100" />
  
  <!-- V-Neck -->
  <path d="M 85 80 L 100 100 L 115 80" />
  
  <!-- Head background outline -->
  <circle cx="100" cy="55" r="28" fill="white" />
  
  <!-- Hair Line across forehead -->
  <path d="M 73 55 C 85 65, 115 65, 127 55" />
  <path d="M 72 55 C 72 15, 128 15, 128 55" />
  
  <!-- Ears -->
  <circle cx="68" cy="60" r="6" />
  <circle cx="132" cy="60" r="6" />

  <!-- Laptop white background to cover person lines beneath it -->
  <path d="M 40 160 L 45 100 L 155 100 L 160 160 Z" fill="white" />

  <!-- Desk Base -->
  <rect x="20" y="160" width="160" height="12" rx="6" fill="white" />
  
  <!-- < / > Symbol inside laptop -->
  <path d="M 85 115 L 70 130 L 85 145" />
  <path d="M 105 110 L 95 150" />
  <path d="M 115 115 L 130 130 L 115 145" />
</svg>
